name: Update Dynamic README Content

on:
  schedule:
    - cron: "0 0 1 * *" # Runs on the 1st of every month
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-experience:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update years of experience
        run: |
          YEARS=$(python3 -c "
          from datetime import date
          start = date(2020, 3, 1)
          today = date.today()
          years = int((today - start).days / 365.25)
          print(f'{years}+')
          ")
          sed -i "s/<!--EXP_YEARS-->.*<!--\/EXP_YEARS-->/<!--EXP_YEARS-->${YEARS}+<!--\/EXP_YEARS-->/g" README.md
          echo "Updated experience to ${YEARS} years"

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update dynamic README content"
          committer_name: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com

  generate-snake:
    runs-on: ubuntu-latest
    needs: update-experience
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: sad-adnan
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
